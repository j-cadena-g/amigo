services:
  # PostgreSQL 17 Database
  postgres:
    image: postgres:17-alpine
    container_name: amigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amigo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey 8 (Redis fork) for Sessions and Pub/Sub
  valkey:
    image: valkey/valkey:8-alpine
    container_name: amigo-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    networks:
      - amigo-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Caddy Reverse Proxy with DNS-01 SSL
  caddy:
    image: ghcr.io/amigo/caddy-cloudflare:latest
    build:
      context: ./docker/caddy
      dockerfile: Dockerfile
    container_name: amigo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - amigo-network
    depends_on:
      - web-prod

  # Next.js Web App (Production)
  web-prod:
    image: ghcr.io/amigo/web:latest
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://valkey:6379
      AUTHELIA_ISSUER: ${AUTHELIA_ISSUER}
      AUTHELIA_CLIENT_ID: ${AUTHELIA_CLIENT_ID}
      AUTHELIA_CLIENT_SECRET: ${AUTHELIA_CLIENT_SECRET}
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # Hono API Server (Production)
  api-prod:
    image: ghcr.io/amigo/api:latest
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://valkey:6379
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

networks:
  amigo-network:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  caddy_data:
  caddy_config:
