services:
  # PostgreSQL 17 Database (shared between dev and prod)
  postgres:
    image: postgres:17-alpine
    container_name: amigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-dev-db.sh:/docker-entrypoint-initdb.d/init-dev-db.sh:ro
    ports:
      - "5432:5432"
    networks:
      - amigo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey 8 (Redis fork) for Sessions and Pub/Sub (shared)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: amigo-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    networks:
      - amigo-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Caddy Reverse Proxy with DNS-01 SSL
  caddy:
    build:
      context: ./docker/caddy
      dockerfile: Dockerfile
    container_name: amigo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - amigo-network
    depends_on:
      - web-prod
      - web-dev

  # ============================================
  # PRODUCTION STACK (amigo.cadenalabs.net)
  # ============================================

  web-prod:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-prod
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}
      VALKEY_URL: redis://localhost:6379
      AUTHELIA_ISSUER: ${AUTHELIA_ISSUER}
      AUTHELIA_CLIENT_ID: ${AUTHELIA_CLIENT_ID}
      AUTHELIA_CLIENT_SECRET: ${AUTHELIA_CLIENT_SECRET}
      APP_URL: https://amigo.cadenalabs.net
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api-prod:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VALKEY_URL: redis://valkey:6379
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # ============================================
  # DEVELOPMENT STACK (dev-amigo.cadenalabs.net)
  # ============================================

  web-dev:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      target: runner
    container_name: amigo-web-dev
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://localhost:6379
      AUTHELIA_ISSUER: ${AUTHELIA_ISSUER}
      AUTHELIA_CLIENT_ID: ${AUTHELIA_CLIENT_ID}
      AUTHELIA_CLIENT_SECRET: ${AUTHELIA_CLIENT_SECRET}
      APP_URL: https://dev-amigo.cadenalabs.net
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  api-dev:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: amigo-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}_dev
      VALKEY_URL: redis://valkey:6379
    networks:
      - amigo-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

networks:
  amigo-network:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  caddy_data:
  caddy_config:
